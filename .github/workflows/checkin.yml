name: APK.TW 每日簽到
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python checkin.py
        env:
          APK_USERNAME: ${{ secrets.APK_USERNAME }}
          APK_PASSWORD: ${{ secrets.APK_PASSWORD }}
